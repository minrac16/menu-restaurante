<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Forms</title>
</head>
<body>
  <!-- Static skeleton for Netlify Forms build-time detection -->
  <form name="restaurant-order" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="restaurant-order" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="table-number" />
    <input type="text" name="order-items" />
    <input type="text" name="order-total" />
    <textarea name="notes"></textarea>
    <input name="bot-field" />
  </form>
</body>
</html>
